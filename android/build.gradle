// Top-level build file for Altirra Android
// Plugins are applied in app/build.gradle

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.1.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
